<!-- navbar.html — Reusable navbar snippet -->
<!-- Include this via JS fetch or copy-paste into each page -->
<!-- Set data-page on <body> to highlight active link -->

<style>
.navbar{background:#1a2a4a;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:500;height:68px;box-shadow:0 3px 12px rgba(0,0,0,.3)}
.navbar-left{display:flex;align-items:center;gap:12px}
.navbar-left img.logo{height:56px;width:56px;object-fit:contain}
.brand-wrap{line-height:1.25}
.brand-main{font-size:16px;font-weight:800;color:#efcb33;letter-spacing:.3px}
.brand-sub{font-size:10px;font-weight:500;color:#8ab0d4;letter-spacing:.5px}
.navbar-center{display:flex;gap:2px}
.navbar-center a{color:#c8dff0;text-decoration:none;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;transition:.15s;display:flex;align-items:center;gap:5px}
.navbar-center a:hover{background:rgba(255,255,255,.1);color:#fff}
.navbar-center a.active{background:#efcb33;color:#1a2a4a}
.wl-badge{background:#efcb33;color:#1a2a4a;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px}
.navbar-center a.active .wl-badge{background:#1a2a4a;color:#efcb33}
.navbar-right{display:flex;align-items:center;gap:10px;position:relative}
.btn-logout-nav{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:rgba(229,57,53,.18);border:1.5px solid rgba(229,57,53,.4);color:#ff6b6b;font-size:16px;text-decoration:none;transition:.15s;position:relative}
.btn-logout-nav:hover{background:rgba(229,57,53,.35);border-color:#e53935;color:#fff}
.btn-logout-nav::after{content:'Log Out';position:absolute;top:calc(100% + 8px);right:0;background:#333;color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;font-family:'Segoe UI',sans-serif}
.btn-logout-nav:hover::after{opacity:1}
.profile-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:24px;padding:5px 13px 5px 6px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-size:13px;font-weight:700;color:#efcb33;transition:.15s;text-decoration:none}
.profile-btn:hover{background:rgba(239,203,51,.15);border-color:#efcb33}
.profile-btn .p-avatar{width:32px;height:32px;border-radius:50%;background:#efcb33;color:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.profile-btn .p-arr{font-size:10px;color:#8ab0d4;margin-left:2px}
</style>

<nav class="navbar">
  <div class="navbar-left">
    <img src="logo.png" alt="UUM Logo" class="logo">
    <div class="brand-wrap">
      <div class="brand-main">SmartTimetable UUM</div>
      <div class="brand-sub">UNIVERSITI UTARA MALAYSIA</div>
    </div>
  </div>
  <div class="navbar-center" id="nav-links">
    <a href="home.html"        data-nav="home">Home</a>
    <a href="course_list.html" data-nav="course_list">Course List</a>
    <a href="wishlist.html"    data-nav="wishlist">Wishlist <span class="wl-badge" id="wl-count" style="display:none">0</span></a>
    <a href="timetable.html"   data-nav="timetable">Timetable</a>
  </div>
  <div class="navbar-right">
    <a href="index.html" class="btn-logout-nav" title="Log Out">🚪</a>
    <a href="profile.html" class="profile-btn">
      <div class="p-avatar" id="nav-avatar">U</div>
      <span id="nav-firstname">Student</span>
      <span class="p-arr">▾</span>
    </a>
  </div>
</nav>

<script>
// Highlight active page
(function(){
  const page = document.body.dataset.page || '';
  document.querySelectorAll('[data-nav]').forEach(a => {
    if (a.dataset.nav === page) a.classList.add('active');
  });

  // Load student info from localStorage
  const name = localStorage.getItem('st_name') || 'Student';
  const firstName = name.split(' ')[0];
  const avatar = document.getElementById('nav-avatar');
  const navFirst = document.getElementById('nav-firstname');
  if (avatar) avatar.textContent = firstName[0].toUpperCase();
  if (navFirst) navFirst.textContent = firstName;

  // Wishlist badge
  const wl = JSON.parse(localStorage.getItem('wishlist') || '[]');
  const badge = document.getElementById('wl-count');
  if (badge && wl.length > 0) { badge.textContent = wl.length; badge.style.display='inline'; }
})();
</script>
